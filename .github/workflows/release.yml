name: Build and Release AI Agent OS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: my_local_agent
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        include:
          - os: macos-latest
            artifact_name: AIAgentOS-macOS
            asset_name: AIAgentOS-macOS
          - os: windows-latest
            artifact_name: AIAgentOS.exe
            asset_name: AIAgentOS-Windows.exe
          - os: ubuntu-latest
            artifact_name: AIAgentOS
            asset_name: AIAgentOS-Linux

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev portaudio19-dev

      - name: Patch Requirements for Non-macOS
        if: matrix.os != 'macos-latest'
        shell: bash
        run: |
          # Rimuove le librerie specifiche per Apple Silicon (MLX) dai requirements per non far fallire la build
          sed -i.bak '/^mlx/d' requirements.txt || true

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Standalone Executable
        env:
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
        run: python build_exe.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: my_local_agent/dist/${{ matrix.artifact_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
